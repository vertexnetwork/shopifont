name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Branch protection on `main` requires two check names:
#   - "Typecheck, lint, test, build"  (the `verify` job below)
#   - "Lighthouse mobile budget"      (the `lighthouse` job below)
#
# Both jobs are inlined here so the check names are deterministic and
# don't depend on a reusable workflow living in another repo. The
# audit doc (vertex-network-hub spec §11) recommends a shared
# reusable workflow; that's a follow-up coordinated with the hub side
# when we're ready to tag a stable contract. For now, inline keeps
# PR merges from hanging on "Expected — Waiting" checks that never
# report.

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  lighthouse:
    name: Lighthouse mobile budget
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Optional, not required by branch protection. Keep failing-PR
  # signal without blocking merges while the e2e suite stabilizes.
  e2e:
    name: Playwright (smoke + a11y + OG)
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run Playwright
        # PLAYWRIGHT_BASE_URL is intentionally unset — playwright.config.ts
        # falls back to http://localhost:3000 and boots `next start` via
        # its `webServer` block. Setting the env var (even to "") would
        # disable the auto-launched server and break the run.
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
