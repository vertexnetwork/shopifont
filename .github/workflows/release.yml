name: Release

# Auto-tags on conventional-commit-style merges to main. Spec §11
# optional. Tags use a date-suffixed build identifier
# (YYYY.MM.DD-<short-sha>) rather than semver because Shopifont is a
# single-deploy site, not a versioned library.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute tag
        id: tag
        run: |
          DATE=$(date -u +'%Y.%m.%d')
          SHA=$(git rev-parse --short HEAD)
          echo "tag=v${DATE}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"
