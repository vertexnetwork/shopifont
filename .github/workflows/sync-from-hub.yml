name: Sync from vertex-network-hub

# Listens for repository_dispatch from the hub and pulls updated
# network-wide files. Daily cron is a belt-and-suspenders backup.
#
# WHAT GETS SYNCED BY DEFAULT (safe — identical on every spoke):
#   public/network.json   — registry of all sites; drives /network
#   public/ai-bots.json   — AI crawler allowlist for robots.ts
#
# WHAT IS NOT SYNCED (per-spoke):
#   public/ads.txt, public/app-ads.txt — publisher IDs differ
#   public/humans.txt                  — per-site credits
#   public/.well-known/security.txt    — per-site security contact

on:
  repository_dispatch:
    types: [vertex-hub-sync]
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  HUB_RAW: https://raw.githubusercontent.com/ThatMovieGuyOriginal/vertex-network-hub/main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull network-wide files from hub
        run: |
          set -eu
          mkdir -p public
          curl -fsSL "$HUB_RAW/config/network.json" -o public/network.json
          curl -fsSL "$HUB_RAW/config/ai-bots.json" -o public/ai-bots.json

      - name: Open sync PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync from vertex-network-hub"
          title: "chore: sync from vertex-network-hub"
          body: |
            Automated sync from [vertex-network-hub](https://github.com/ThatMovieGuyOriginal/vertex-network-hub).

            - Triggered by: `${{ github.event.client_payload.actor || github.event_name }}`
            - Hub commit: `${{ github.event.client_payload.sha || 'n/a' }}`

            Auto-merge once CI is green.
          branch: hub-sync
          delete-branch: true
          labels: hub-sync,automated
