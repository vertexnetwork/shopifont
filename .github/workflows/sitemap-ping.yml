name: Sitemap ping (post-deploy)

# Pokes Google + Bing IndexNow after every successful main push.
# Doesn't replace Search Console submission; nudges the index.
# IndexNow accepts up to 10,000 URLs per request — we send the
# canonical sitemap URL so each engine pulls the live list.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ping:
    name: Notify search engines
    runs-on: ubuntu-latest
    steps:
      - name: Ping Bing IndexNow
        run: |
          curl -sSf -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "shopifont.app",
              "key": "${{ secrets.INDEXNOW_KEY || 'dummy' }}",
              "urlList": ["https://shopifont.app/sitemap.xml"]
            }' || echo "[bing] ping non-fatal"

      - name: Submit to Google (sitemap re-fetch nudge)
        run: |
          # Google deprecated the sitemap-ping endpoint in 2023; the
          # IndexNow path is the modern replacement. Re-verifying via
          # GSC is the recommended primary signal — this step is a
          # belt-and-suspenders that won't fail the workflow.
          echo "Use Search Console for primary sitemap submission."
